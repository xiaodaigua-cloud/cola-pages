<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨学科要素对比 · 虚拟仿真导入</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "SF Pro Display", "PingFang SC", sans-serif;
            background: radial-gradient(ellipse at 50% 60%, #0a1e3d 0%, #050e1a 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        /* 网格底纹 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(30,120,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,120,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* 扫描线 */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0,200,255,0.4), transparent);
            animation: scanLine 4s linear infinite;
            pointer-events: none;
            z-index: 50;
        }
        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .top-label {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .top-label .text {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 4px;
            color: #00d4ff;
            opacity: 0;
            transition: all 0.8s ease;
            transform: translateY(-8px);
            text-shadow: 0 0 12px rgba(0,212,255,0.4);
            font-family: monospace, "PingFang SC";
        }
        .top-label .text.show { opacity: 1; transform: translateY(0); }

        .columns {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1px 1fr 1px 1fr;
            padding: 0 20px 20px;
        }
        .divider { background: linear-gradient(180deg, transparent, rgba(0,200,255,0.15), transparent); }

        .col {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 10px;
        }
        .col-title {
            font-size: 12px;
            color: rgba(0,212,255,0.7);
            letter-spacing: 4px;
            font-weight: 500;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-family: monospace, "PingFang SC";
        }

        .svg-wrap {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .svg-wrap svg {
            width: 100%;
            max-width: 300px;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(0,200,255,0.1));
        }

        /* SVG层动画 */
        .svg-layer {
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .svg-layer.show { opacity: 1; }

        /* 发光线条风格 */
        .glow-stroke {
            stroke: #00d4ff;
            filter: drop-shadow(0 0 3px rgba(0,212,255,0.6));
        }
        .glow-fill { fill: rgba(0,212,255,0.06); }
        .warm-stroke {
            stroke: #ffa500;
            filter: drop-shadow(0 0 3px rgba(255,165,0,0.5));
        }
        .warm-fill { fill: rgba(255,165,0,0.06); }
        .green-stroke {
            stroke: #00ff88;
            filter: drop-shadow(0 0 3px rgba(0,255,136,0.5));
        }

        .label-text {
            font-size: 10px;
            fill: rgba(0,212,255,0.8);
            font-family: monospace, "PingFang SC";
            letter-spacing: 1px;
        }
        .label-text-warm {
            font-size: 10px;
            fill: rgba(255,165,0,0.8);
            font-family: monospace, "PingFang SC";
        }

        /* 第5层特殊 */
        .mystery-ring {
            animation: ringPulse 1.5s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { opacity: 0.5; r: 28; }
            50% { opacity: 1; r: 32; }
        }
        .mystery-text {
            font-size: 28px;
            fill: #ffd700;
            font-weight: 800;
            animation: textPulse 1s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(255,215,0,0.6));
        }
        @keyframes textPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .check-text {
            font-size: 11px;
            fill: #00ff88;
            font-family: monospace;
            font-weight: 700;
            filter: drop-shadow(0 0 4px rgba(0,255,136,0.4));
        }

        /* 底部数据条 */
        .data-bar {
            height: 28px;
            background: rgba(0,20,40,0.8);
            border-top: 1px solid rgba(0,200,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            font-size: 10px;
            color: rgba(0,212,255,0.5);
            font-family: monospace;
            letter-spacing: 1px;
        }

        .blackout {
            position: fixed; inset: 0;
            background: #050e1a;
            opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease; z-index: 100;
        }
        .blackout.show { opacity: 1; }

        .play-btn {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 200; background: rgba(5,14,26,0.92);
            cursor: pointer; transition: opacity 0.5s;
        }
        .play-btn.hide { opacity: 0; pointer-events: none; }
        .play-btn span {
            font-size: 16px; color: #00d4ff;
            border: 1px solid rgba(0,212,255,0.4);
            padding: 16px 40px; border-radius: 4px;
            font-family: monospace; letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(0,212,255,0.3);
        }
        .play-btn:hover span { background: rgba(0,212,255,0.05); border-color: #00d4ff; }
    </style>
</head>
<body>
    <div class="play-btn" id="playBtn" onclick="startAnimation()"><span>[ ▶ START ]</span></div>

        <div class="divider"></div>

    <div class="data-bar">
        <span>SIM_MODE: STRUCTURAL_ANALYSIS</span>
        <span id="stepIndicator">STEP: --/5</span>
        <span>STATUS: READY</span>
    </div>

    <script>
        const topTexts = [
            '[ 驱动力 ] 系统的能量来源',
            '[ 骨  架 ] 整体的结构支撑',
            '[ 表  达 ] 功能的外在呈现',
            '[ 平  衡 ] 系统的稳定保障',
            '[ ？？？ ] 决定体验的最终差异'
        ];
        const topEl = document.getElementById('topText');
        const stepEl = document.getElementById('stepIndicator');
        const blackout = document.getElementById('blackout');

        function showStep(step) {
            topEl.classList.remove('show');
            setTimeout(() => {
                topEl.textContent = topTexts[step - 1];
                topEl.classList.add('show');
            }, 200);
            stepEl.textContent = `STEP: ${String(step).padStart(2,'0')}/05`;
            document.querySelectorAll(`.svg-layer[data-step="${step}"]`).forEach((el, i) => {
                setTimeout(() => el.classList.add('show'), i * 200);
            });
        }

        function startAnimation() {
            document.getElementById('playBtn').classList.add('hide');
            setTimeout(() => showStep(1), 500);
            setTimeout(() => showStep(2), 5500);
            setTimeout(() => showStep(3), 10500);
            setTimeout(() => showStep(4), 15500);
            setTimeout(() => showStep(5), 20500);
            setTimeout(() => blackout.classList.add('show'), 28500);
        }
    </script>
</body>
</html>
