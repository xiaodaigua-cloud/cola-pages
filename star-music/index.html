<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星星乐 · 个性化特殊教育应用库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', sans-serif;
  background: linear-gradient(135deg, #E8F5E9 0%, #FFF8E1 30%, #E3F2FD 70%, #FCE4EC 100%);
  min-height: 100vh; padding: 40px 24px;
}
.header {
  text-align: center; margin-bottom: 40px;
}
.header h1 {
  font-size: 28px; color: #5B4A3F;
  background: linear-gradient(135deg, #FF9F43, #FF6B6B);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header p {
  margin-top: 8px; font-size: 16px; color: #8B7355;
}
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px; max-width: 1000px; margin: 0 auto;
}
.card {
  background: rgba(255,255,255,0.85); border-radius: 20px;
  padding: 28px 24px; text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  border: 2px solid transparent;
  transition: all 0.3s;
  position: relative; overflow: hidden;
}
.card.active {
  border-color: #FF9F43;
  cursor: pointer;
}
.card.active:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(255,159,67,0.2);
}
.card.locked {
  opacity: 0.7;
}
.card-icon {
  font-size: 48px; margin-bottom: 12px;
}
.card-title {
  font-size: 18px; font-weight: 700; color: #5B4A3F;
  margin-bottom: 8px;
}
.card-status {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
}
.card-status.online {
  background: linear-gradient(135deg, #66BB6A, #43A047);
  color: white;
}
.card-status.dev {
  background: #E0E0E0; color: #999;
}
.card .badge {
  position: absolute; top: 12px; right: 12px;
  background: #FF9F43; color: white;
  font-size: 11px; font-weight: 700;
  padding: 3px 8px; border-radius: 10px;
}
</style>
</head>
<body>

<div class="header">
  <h1>⭐ 星星乐 · 个性化特殊教育应用库 ⭐</h1>
  <p>面向特殊儿童的音乐感知与互动训练应用</p>
</div>

<div class="grid">
  <div class="card active" onclick="window.location.href='game.html'">
    <div class="badge">可体验</div>
    <div class="card-icon">🎹</div>
    <div class="card-title">星星乐 · 五声音阶互动</div>
    <span class="card-status online">已上线</span>
  </div>
  <div class="card locked">
    <div class="card-icon">🥁</div>
    <div class="card-title">节奏跟打 · 虫儿飞</div>
    <span class="card-status dev">开发中</span>
  </div>
  <div class="card locked">
    <div class="card-icon">🎚️</div>
    <div class="card-title">力度感知 · 轻重游戏</div>
    <span class="card-status dev">开发中</span>
  </div>
  <div class="card locked">
    <div class="card-icon">⏱️</div>
    <div class="card-title">速度辨听 · 快慢挑战</div>
    <span class="card-status dev">开发中</span>
  </div>
  <div class="card locked">
    <div class="card-icon">🎻</div>
    <div class="card-title">音色辨辨看 · 中西乐器</div>
    <span class="card-status dev">开发中</span>
  </div>
</div>

</body>
</html>
